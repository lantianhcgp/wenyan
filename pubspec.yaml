name: wenyan_classics
description: 文言文学习 App（Flutter）
publish_to: 'none'
version: 0.3.0+4

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.0
  shared_preferences: ^2.2.3
  path: ^1.9.0
  path_provider: ^2.1.2
  sqflite: ^2.3.3+1
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/texts/
    - assets/db/
