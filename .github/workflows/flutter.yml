name: CI
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Flutter version
        run: flutter --version
      - name: Ensure Android platform (generate android/)
        run: flutter create . --platforms=android
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        continue-on-error: true
        run: flutter analyze
      - name: Test
        continue-on-error: true
        run: flutter test
      - name: Build APK (debug)
        run: |
          echo 'org.gradle.jvmargs=-Xmx3g -Dkotlin.daemon.jvm.options=-Xmx3g' >> android/gradle.properties
          flutter build apk --debug
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Flutter version
        run: flutter --version
      - name: Ensure Android platform (generate android/)
        run: flutter create . --platforms=android
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        continue-on-error: true
        run: flutter analyze
      - name: Test
        continue-on-error: true
        run: flutter test
      - name: Build release artifacts
        run: |
          echo 'org.gradle.jvmargs=-Xmx4g -Dkotlin.daemon.jvm.options=-Xmx4g' >> android/gradle.properties
          flutter build apk --release --split-per-abi
          flutter build appbundle --release
      - name: Release APK/AAB
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/*release*.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
